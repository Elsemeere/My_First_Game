<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=700, user-scalable=yes" />
  <title>Maze Golf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-container">

    <!-- Top bar: title, hole indicator, shot counter, and reset button -->
    <div id="ui-bar">
      <span id="title-label">Maze Golf</span>
      <span id="level-label">Hole 1</span>
      <span id="shot-counter">Shots: 0</span>
      <button id="reset-btn">Reset</button>
    </div>

    <!-- The canvas is where all game drawing happens -->
    <canvas id="game-canvas" width="700" height="500"></canvas>

    <!-- Win screen shown on top of the canvas when the ball reaches the hole -->
    <div id="win-screen" class="hidden">
      <div id="win-box">
        <h2 id="win-title">Hole Complete!</h2>
        <p id="win-shots-line">Finished in <span id="win-shots">?</span> shots</p>
        <p id="par-line"></p>
        <div id="scorecard" class="hidden">
          <table id="score-table">
            <tr id="score-holes-row"></tr>
            <tr id="score-par-row"></tr>
            <tr id="score-shots-row"></tr>
            <tr id="score-diff-row"></tr>
          </table>
        </div>
        <div id="win-buttons">
          <button id="next-hole-btn">Next Hole →</button>
          <button id="play-again-btn">Restart Hole</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Load the game logic last so the DOM is ready -->
  <script src="game.js"></script>
</body>
</html>
